{% extends 'base.html' %}
{% block page_title %}Password Changed{% endblock %}

{% block login_content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="glass-card p-5 text-center" style="max-width: 450px; width: 100%;">
        <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-25 rounded-circle mb-4" style="width: 80px; height: 80px;">
            <i data-lucide="check-circle" class="text-success" style="width: 40px; height: 40px;"></i>
        </div>
        
        <h2 class="text-white fw-bold mb-3">Password Changed!</h2>
        
        <p class="text-secondary mb-4">
            Your password has been securely reset. You can now use your new password to log in to your account.
        </p>

        <a href="{% url 'login' %}" class="btn btn-success w-100 rounded-pill py-2 shadow-lg d-flex justify-content-center align-items-center gap-2">
            <i data-lucide="log-in" style="width: 18px;"></i> Log In Now
        </a>
    </div>
</div>
{% endblock %}
