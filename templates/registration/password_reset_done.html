{% extends 'base.html' %}
{% block page_title %}Check Your Email{% endblock %}

{% block login_content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="glass-card p-5 text-center" style="max-width: 450px; width: 100%;">
        <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-25 rounded-circle mb-4" style="width: 80px; height: 80px;">
            <i data-lucide="mail-check" class="text-success" style="width: 40px; height: 40px;"></i>
        </div>
        
        <h2 class="text-white fw-bold mb-3">Verify OTP</h2>
        
        <p class="text-secondary mb-4">
            We've sent a 6-digit OTP code to your email. Please enter it below to verify your identity.
        </p>

        <form method="POST" action="{% url 'verify_otp' %}">
            {% csrf_token %}
            {% if error %}
                <div class="alert alert-danger border-danger border-opacity-50" style="background: rgba(239,68,68,0.1);">
                    <small>{{ error }}</small>
                </div>
            {% endif %}

            <div class="mb-4 text-start">
                <label class="form-label text-secondary small mb-1">6-Digit OTP</label>
                <div class="input-group">
                    <span class="input-group-text glass-input border-end-0">
                        <i data-lucide="key" style="width:18px;" class="text-secondary"></i>
                    </span>
                    <input type="text" name="otp" class="form-control glass-input border-start-0 text-white" placeholder="123456" maxlength="6" required autofocus>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow-lg mb-3">
                Verify Code
            </button>
        </form>

        <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100 rounded-pill py-2 shadow-lg mt-2">
            Return to Login
        </a>
    </div>
</div>
{% endblock %}
