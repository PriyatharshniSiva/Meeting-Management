{% extends 'base.html' %}
{% block page_title %}Set New Password{% endblock %}

{% block login_content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="glass-card p-5" style="max-width: 450px; width: 100%;">
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-25 rounded-circle mb-3" style="width: 64px; height: 64px;">
                <i data-lucide="lock" class="text-primary" style="width: 32px; height: 32px;"></i>
            </div>
            <h2 class="text-white fw-bold">Set New Password</h2>
            <p class="text-secondary small mt-2">Please enter your new password twice so we can verify you typed it in correctly.</p>
        </div>

        <form method="POST" action="{% url 'set_new_password' %}">
            {% csrf_token %}
            {% if error %}
                <div class="alert alert-danger border-danger border-opacity-50" style="background: rgba(239,68,68,0.1);">
                    <small>{{ error }}</small>
                </div>
            {% endif %}

            <div class="mb-4">
                <label class="form-label text-secondary small mb-1">New Password</label>
                <div class="input-group">
                    <span class="input-group-text glass-input border-end-0">
                        <i data-lucide="key-round" style="width:18px;" class="text-secondary"></i>
                    </span>
                    <input type="password" name="password" class="form-control glass-input border-start-0 text-white" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-secondary small mb-1">Confirm New Password</label>
                <div class="input-group">
                    <span class="input-group-text glass-input border-end-0">
                        <i data-lucide="key-round" style="width:18px;" class="text-secondary"></i>
                    </span>
                    <input type="password" name="confirm_password" class="form-control glass-input border-start-0 text-white" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow-lg d-flex justify-content-center align-items-center gap-2">
                Change Password <i data-lucide="check" style="width: 18px;"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
